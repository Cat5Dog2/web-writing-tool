services:
  dotnet-sdk:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    entrypoint: ["dotnet"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      HOME: /home/dotnet
      NUGET_PACKAGES: /home/dotnet/.nuget/packages
    ports:
      - "5080:8080"
    volumes:
      - .:/workspace
      - dotnet_nuget_cache:/home/dotnet/.nuget/packages
      - dotnet_usersecrets:/home/dotnet/.microsoft/usersecrets
      - dotnet_aspnet:/home/dotnet/.aspnet

volumes:
  dotnet_nuget_cache:
  dotnet_usersecrets:
  dotnet_aspnet:
